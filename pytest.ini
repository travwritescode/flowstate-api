[pytest]
testpaths = tests
addopts = --cov --cov-fail-under=95
markers =
    unit: Pure logic, no I/O — runs on every PR
    smoke: Minimal fast subset
    regression: Full suite
    blocked_prd: Test written but PRD behaviour not yet implemented
    current_behavior: Asserts current (non-PRD) behaviour as a baseline

[coverage:run]
source =
    app/models
    app/utils/auth
    app/schemas
    app/config
    app/database
omit =
    app/dependencies.py

[coverage:report]
fail_under = 95
show_missing = true
